services:
  db:
    image: postgres:16-alpine
    container_name: melanoma-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: melanoma
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d melanoma"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: melanoma-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/melanoma?schema=public
      JWT_SECRET: ${JWT_SECRET:-docker-dev-secret-change-me}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data:
  uploads_data:
